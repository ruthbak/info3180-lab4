{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

<div class="image-grid">
    {% for image in images %}
        <div class="image-item">
            <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
        </div>
    {% endfor %}
</div>

<style>
    .image-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 20px;
    }
    .image-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
</style>
{% endblock %}
